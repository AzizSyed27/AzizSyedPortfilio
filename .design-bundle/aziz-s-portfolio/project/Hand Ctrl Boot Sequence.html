<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hand Ctrl — Boot Sequence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500&family=JetBrains+Mono:wght@300;400;500&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0F14;
    --near-black: #05080B;
    --fg: #E8F6FB;
    --accent: #4FDFFF;
    --accent-bright: #8BEBFF;
    --accent-dim: rgba(79, 223, 255, 0.55);
    --line: rgba(79, 223, 255, 0.18);
    --line-strong: rgba(79, 223, 255, 0.42);
    --muted: rgba(232, 246, 251, 0.55);
    --muted-2: rgba(232, 246, 251, 0.34);
    --live: #2FE6C0;
    --mag: #E06CD8;
    --f-display: "Instrument Serif", serif;
    --f-body: "Bricolage Grotesque", -apple-system, sans-serif;
    --f-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }

  /* ── Frame shell ── */
  .frame {
    position: relative; width: 100%; height: 100%; overflow: hidden;
    background: var(--near-black); color: var(--fg);
    font-family: var(--f-mono);
  }
  .vignette { position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 100% at 50% 42%, transparent 40%, rgba(0,0,0,0.55) 100%); }
  .frame-tag {
    position: absolute; left: 22px; bottom: 18px; z-index: 6;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-2);
  }

  /* corner ticks */
  .corner-min, .hud-corner-x { position: absolute; width: 26px; height: 26px; z-index: 5; }
  .corner-min::before, .corner-min::after,
  .hud-corner-x::before, .hud-corner-x::after { content: ""; position: absolute; background: var(--accent); opacity: 0.4; }
  .corner-min::before, .hud-corner-x::before { width: 12px; height: 1px; }
  .corner-min::after, .hud-corner-x::after { width: 1px; height: 12px; }
  .hud-corner-x.on::before, .hud-corner-x.on::after { opacity: 0.8; }
  .tl { top: 20px; left: 20px; } .tl::before, .tl::after { top: 0; left: 0; }
  .tr { top: 20px; right: 20px; } .tr::before { top: 0; right: 0; } .tr::after { top: 0; right: 0; }
  .bl { bottom: 20px; left: 20px; } .bl::before { bottom: 0; left: 0; } .bl::after { bottom: 0; left: 0; }
  .br { bottom: 20px; right: 20px; } .br::before { bottom: 0; right: 0; } .br::after { bottom: 0; right: 0; }

  /* ── FRAME 01 · CLI (Copilot-style terminal homage) ── */
  .frame-cli { background: #070B10; color: var(--fg); }
  .frame-cli::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
    background-image: linear-gradient(rgba(79,223,255,0.05) 50%, transparent 50%);
    background-size: 100% 4px;
  }
  .cli-corner { position: absolute; width: 26px; height: 26px; z-index: 5; }
  .cli-corner::before, .cli-corner::after { content: ""; position: absolute; background: var(--muted); opacity: 0.6; }
  .cli-corner::before { width: 18px; height: 1.5px; }
  .cli-corner::after { width: 1.5px; height: 18px; }
  .cli-corner.tl { top: 26px; left: 30px; } .cli-corner.tl::before, .cli-corner.tl::after { top: 0; left: 0; }
  .cli-corner.tr { top: 26px; right: 30px; } .cli-corner.tr::before { top: 0; right: 0; } .cli-corner.tr::after { top: 0; right: 0; }
  .cli-corner.bl { bottom: 26px; left: 30px; } .cli-corner.bl::before { bottom: 0; left: 0; } .cli-corner.bl::after { bottom: 0; left: 0; }
  .cli-corner.br { bottom: 26px; right: 30px; } .cli-corner.br::before { bottom: 0; right: 0; } .cli-corner.br::after { bottom: 0; right: 0; }

  .cli-inner { position: absolute; inset: 0; padding: 52px 64px; display: flex; flex-direction: column;
    font-family: var(--f-mono); z-index: 4; }
  .cli-welcome { font-size: 13px; color: var(--muted); letter-spacing: 0.02em; margin-bottom: 14px; }
  .cli-wordmark-row { display: flex; align-items: center; gap: 26px; }
  .cli-wordmark { font-family: "Press Start 2P", monospace; font-size: 46px; line-height: 1;
    color: var(--accent); letter-spacing: 2px;
    -webkit-text-stroke: 1.5px #1C5C78;
    text-shadow: 0 5px 0 rgba(10,40,58,0.85), 0 0 18px rgba(79,223,255,0.25); }
  .pixel-hand { width: 70px; height: auto; display: block; }
  .pixel-hand .px-blue { fill: var(--accent); }
  .pixel-hand .px-mag { fill: var(--mag); }
  .pixel-hand .px-grn { fill: var(--live); }
  .cli-version { font-size: 12px; color: var(--muted); margin-top: 10px; align-self: flex-start; }
  .cli-commit { font-size: 12px; color: var(--muted-2); margin-top: 20px; padding-bottom: 16px;
    border-bottom: 0.5px solid var(--line); }
  .cli-desc { font-size: 13.5px; line-height: 1.6; color: var(--fg); max-width: 64ch; margin: 18px 0 22px; }
  .cli-bullets { display: flex; flex-direction: column; gap: 9px; }
  .cli-bullet { display: flex; align-items: center; gap: 11px; font-size: 13px; color: var(--fg); }
  .b-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 7px 0 var(--accent-dim); flex: none; }
  .b-dot.grn { background: var(--live); box-shadow: 0 0 7px 0 rgba(47,230,192,0.5); }
  .cli-promptline { margin-top: auto; font-size: 13px; color: var(--accent); font-weight: 500; padding-top: 22px; }
  .cli-branch { color: var(--mag); }
  .cli-input { margin-top: 12px; display: flex; align-items: center; gap: 12px;
    border: 0.5px solid var(--line-strong); border-radius: 8px; padding: 13px 16px;
    background: rgba(79,223,255,0.04); }
  .cli-arrow { color: var(--accent); font-size: 14px; font-weight: 500; }
  .cli-ph { font-size: 13px; color: var(--muted); }
  .cli-ph b { color: var(--accent); font-weight: 500; }
  .cli-cursor { width: 8px; height: 15px; background: var(--accent); margin-left: -6px;
    animation: cblink 1s steps(1) infinite; }

  /* ── FRAME 01 · BLACK (legacy styles, unused) ── */
  .scanline { position: absolute; left: 0; right: 0; height: 1px; top: 0;
    background: linear-gradient(90deg, transparent, var(--accent-dim) 50%, transparent);
    opacity: 0.6; animation: scan 3.4s cubic-bezier(0.6,0,0.4,1) infinite; }
  @keyframes scan { 0% { top: 8%; opacity: 0; } 12% { opacity: 0.7; } 88% { opacity: 0.7; } 100% { top: 92%; opacity: 0; } }
  .reticle-wrap { position: absolute; inset: 0; display: grid; place-items: center; }
  .reticle { width: 132px; height: 132px; }
  .reticle .r-ring { fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.8;
    stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1.4s ease forwards, breathe 3s ease-in-out 1.4s infinite; }
  .reticle .r-dot { fill: var(--accent); }
  .reticle .r-tick { stroke: var(--accent); stroke-width: 1; opacity: 0.55; }
  .init-label { position: absolute; left: 0; right: 0; top: calc(50% + 96px); text-align: center;
    font-size: 11px; letter-spacing: 0.34em; color: var(--accent); padding-left: 0.34em; }
  .ell i { animation: blinkdot 1.4s steps(1) infinite; }
  .ell i:nth-child(2) { animation-delay: 0.2s; } .ell i:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blinkdot { 0%, 60% { opacity: 1; } 80%, 100% { opacity: 0.15; } }
  @keyframes breathe { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.4; } }

  /* ── FRAME 02 · HUD BOOT ── */
  .frame-boot .hud-core { position: absolute; left: 36px; top: 50%; transform: translateY(-50%);
    width: 440px; height: 440px; }
  .hud-seg { fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.5; }
  .spin-slow { transform-box: fill-box; transform-origin: center; animation: spin 18s linear infinite; }
  .hud-arc, .hud-ring { fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.7; }
  .hud-ring { opacity: 0.45; }
  .hud-cross { stroke: var(--accent); stroke-width: 1; opacity: 0.6; }
  .hud-core-dot { fill: var(--accent); }
  .draw { stroke-dashoffset: 1; animation: draw 1.1s cubic-bezier(0.3,0.7,0.2,1) forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .gauges { position: absolute; left: 132px; bottom: 58px; display: flex; gap: 30px; z-index: 4; align-items: flex-start; }
  .gauge { position: relative; width: 96px; text-align: center; }
  .gauge svg { width: 96px; height: 96px; display: block; overflow: visible; }
  /* tick scale */
  .g-tick { stroke: var(--accent); stroke-width: 0.75; opacity: 0.35; }
  .g-tick-l { stroke: var(--accent); stroke-width: 1; opacity: 0.65; }
  /* segmented outer ring */
  .g-seg { fill: none; stroke: var(--accent); stroke-width: 2.5; opacity: 0.55; }
  /* partial arcs */
  .g-arc { fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.7; stroke-linecap: round; }
  .g-arc-2 { fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.45; stroke-linecap: round; }
  /* dotted inner ring */
  .g-dotted { fill: none; stroke: var(--accent); stroke-width: 2; opacity: 0.5; stroke-linecap: round; }
  /* progress value ring */
  .g-prog-track { fill: none; stroke: var(--line); stroke-width: 2; }
  .g-prog { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 0 1;
    filter: drop-shadow(0 0 2px var(--accent-dim)); }
  /* rotation drivers */
  .spin-cw { transform-box: fill-box; transform-origin: center; animation: spin 14s linear infinite; }
  .spin-cw-slow { transform-box: fill-box; transform-origin: center; animation: spin 26s linear infinite; }
  .spin-ccw { transform-box: fill-box; transform-origin: center; animation: spin-rev 20s linear infinite; }
  @keyframes spin-rev { to { transform: rotate(-360deg); } }
  .g87 { animation: g87 1.2s ease forwards 0.5s; }
  .g92 { animation: g92 1.2s ease forwards 0.7s; }
  .g64 { animation: g64 1.2s ease forwards 0.9s; }
  @keyframes g87 { from { stroke-dasharray: 0 1; } to { stroke-dasharray: 0.87 1; } }
  @keyframes g92 { from { stroke-dasharray: 0 1; } to { stroke-dasharray: 0.92 1; } }
  @keyframes g64 { from { stroke-dasharray: 0 1; } to { stroke-dasharray: 0.64 1; } }
  .g-val { position: absolute; top: 40px; left: 0; right: 0; font-size: 13px; color: var(--fg); letter-spacing: 0.02em; }
  .g-label { position: absolute; top: 56px; left: 0; right: 0; font-size: 8px; letter-spacing: 0.18em; color: var(--muted); }

  .boot-log { position: absolute; right: 54px; top: 50%; transform: translateY(-50%); width: 520px; z-index: 4; }
  .boot-head { font-size: 10px; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 18px;
    padding-bottom: 12px; border-bottom: 0.5px solid var(--line); }
  .boot-line { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 12px;
    letter-spacing: 0.02em; opacity: 1; }
  .bl-caret { color: var(--accent); }
  .bl-key { color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10.5px; white-space: nowrap; }
  .bl-dots { flex: 1; border-bottom: 1px dotted var(--line-strong); height: 1px; margin: 0 2px; opacity: 0.7; transform: translateY(4px); }
  .bl-val { color: var(--fg); white-space: nowrap; }
  .bl-stat { font-size: 9.5px; letter-spacing: 0.08em; color: var(--accent); white-space: nowrap; }
  .bl-stat.s-OK { color: var(--accent); }
  .bl-stat.s-READY, .bl-stat.s-LIVE { color: var(--live); }
  .boot-cursorline { padding: 8px 0 0; font-size: 12px; }
  .boot-cursor { display: inline-block; width: 8px; height: 13px; background: var(--accent);
    vertical-align: -2px; animation: cblink 1s steps(1) infinite; }
  @keyframes cblink { 50% { opacity: 0; } }

  .spin-ccw-mid { transform-box: fill-box; transform-origin: center; animation: spin-rev 32s linear infinite; }

  /* ════ FRAME 02 · FULL JARVIS VISOR ════ */
  .frame-boot { background: radial-gradient(ellipse 58% 52% at 50% 46%, #0a1a28 0%, #05080c 72%); }
  .frame-boot .mod { position: absolute; font-family: var(--f-mono); color: var(--accent); z-index: 4; }

  /* visor curved edges */
  .visor { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
  .vz { fill: none; stroke: var(--accent); stroke-width: 1.2; opacity: 0.5; filter: drop-shadow(0 0 3px rgba(79,223,255,0.4)); }
  .vz.dim { opacity: 0.2; filter: none; }
  .edge-ticks { position: absolute; left: 70px; right: 70px; display: flex; justify-content: space-between; z-index: 3; pointer-events: none; }
  .edge-ticks.top { top: 30px; align-items: flex-end; }
  .edge-ticks.bottom { bottom: 30px; align-items: flex-start; }
  .edge-ticks i { width: 1px; background: var(--accent); opacity: 0.4; display: block; }

  /* top-left cluster */
  .tl-cluster { left: 54px; top: 92px; width: 240px; }
  .tlc-row { display: flex; align-items: center; gap: 9px; }
  .ico-mol { width: 26px; height: 26px; }
  .ico-mol circle { fill: var(--accent); } .ico-mol line { stroke: var(--accent); stroke-width: 1; }
  .m-cap { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); }
  .tlc-main { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .tlc-arc { width: 52px; height: 52px; } .tlc-arc circle { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; }
  .tlc-big { font-size: 40px; color: var(--fg); line-height: 1; display: flex; align-items: baseline; gap: 5px; }
  .tlc-big span { font-size: 13px; color: var(--muted); }
  .tlc-sub { font-size: 9px; letter-spacing: 0.16em; color: var(--muted-2); margin-top: 4px; }
  .tlc-batt { display: flex; align-items: center; gap: 9px; margin-top: 12px; }
  .m-lab { font-size: 10px; letter-spacing: 0.12em; color: var(--muted); }
  .batt { width: 46px; height: 13px; border: 1px solid var(--line-strong); border-radius: 2px; padding: 1.5px; position: relative; }
  .batt::after { content: ""; position: absolute; right: -3px; top: 3.5px; width: 2px; height: 5px; background: var(--line-strong); }
  .batt i { display: block; height: 100%; background: var(--accent); border-radius: 1px; }
  .tlc-glyphs { font-size: 11px; color: var(--line-strong); letter-spacing: 0.22em; margin-top: 14px; }

  /* top-center */
  .tc-cluster { left: 50%; transform: translateX(-50%); top: 24px; display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .tc-clock { font-size: 26px; color: var(--fg); letter-spacing: 0.08em; }
  .tc-search { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.14em; color: var(--accent); border: 0.5px solid var(--line-strong); border-radius: 999px; padding: 4px 13px; }
  .ico-search { width: 13px; height: 13px; } .ico-search circle, .ico-search line { fill: none; stroke: var(--accent); stroke-width: 1.4; }
  .tc-power { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); } .chev { color: var(--accent); }
  .tc-bars { display: flex; align-items: flex-end; gap: 3px; height: 18px; }
  .tc-bars i { width: 3px; background: var(--accent); opacity: 0.7; }

  /* top-right */
  .tr-cluster { right: 60px; top: 92px; width: 220px; display: flex; flex-direction: column; align-items: flex-end; gap: 7px; text-align: right; }
  .trc-lab { font-size: 9px; letter-spacing: 0.16em; color: var(--muted); line-height: 1.4; } .trc-lab b { color: var(--fg); }
  .trc-big { font-size: 30px; color: var(--fg); display: flex; align-items: baseline; gap: 6px; }
  .trc-big span { font-size: 13px; color: var(--muted); } .trc-big em { font-size: 9px; letter-spacing: 0.14em; color: var(--muted); font-style: normal; }
  .trc-sub { font-size: 11px; color: var(--accent); }
  .ico-fan { width: 24px; height: 24px; } .ico-fan path { fill: var(--accent); opacity: 0.5; } .ico-fan circle { fill: var(--accent); }
  .tickbars { width: 64px; height: 36px; } .tb { fill: var(--accent); opacity: 0.7; animation: barpulse 1.8s ease-in-out infinite; }

  /* center reticle */
  .reticle-mod { position: absolute; left: 50%; top: 50%; transform: translate(-52%, -46%); width: 380px; height: 380px; z-index: 4; }
  .ret { width: 380px; height: 380px; display: block; filter: drop-shadow(0 0 4px rgba(79,223,255,0.45)); }
  .ret-dash { fill: none; stroke: var(--accent); stroke-width: 3; stroke-dasharray: 1.6 1.4; opacity: 0.9; }
  .ret-tk { stroke: var(--accent); stroke-width: 1.3; opacity: 0.7; }
  .ret-arc { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; opacity: 0.85; }
  .ret-arc2 { fill: none; stroke: var(--accent-bright); stroke-width: 4; stroke-linecap: round; opacity: 0.95; }
  .ret-arc3 { fill: none; stroke: var(--accent-bright); stroke-width: 4; stroke-linecap: round; opacity: 0.8; }
  .ret-inner { fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 1 1.4; opacity: 0.7; }
  .hex { fill: rgba(79,223,255,0.10); stroke: var(--accent); stroke-width: 0.8; animation: hexpulse 3s ease-in-out infinite; }
  @keyframes hexpulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
  .ret-cx { stroke: var(--accent); stroke-width: 1.5; opacity: 0.8; }
  .ret-bars { position: absolute; left: 30px; top: 64px; width: 64px; height: 56px; transform: rotate(-12deg); }
  .rb { fill: var(--accent); animation: barpulse 1.6s ease-in-out infinite; }
  @keyframes barpulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  .ret-num { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(6px); text-align: center; font-size: 11px; color: var(--accent); letter-spacing: 0.1em; }
  .ret-tag-l { position: absolute; left: 16px; top: 176px; font-size: 9px; letter-spacing: 0.12em; color: var(--accent); }
  .ret-tag-r { position: absolute; right: 8px; top: 176px; font-size: 9px; letter-spacing: 0.12em; color: var(--accent); }

  /* left launcher column */
  .launcher-col { left: 46px; top: 296px; display: flex; flex-direction: column; gap: 13px; }
  .launch-item { display: flex; align-items: center; }
  .li-icon { width: 36px; height: 36px; flex: none; filter: drop-shadow(0 0 3px rgba(79,223,255,0.4)); }
  .li-ring { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; }
  .li-ring2 { fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.5; } .li-dot { fill: var(--accent); }
  .li-flag { margin-left: -3px; height: 20px; display: flex; align-items: center; padding: 0 16px 0 10px; border: 0.5px solid var(--line-strong); border-left: none; background: rgba(79,223,255,0.05); clip-path: polygon(0 0, 100% 0, calc(100% - 9px) 100%, 0 100%); }
  .li-flag span { font-size: 9.5px; letter-spacing: 0.14em; color: var(--muted); white-space: nowrap; }

  /* helix + bio */
  .bio-mod { left: 232px; bottom: 86px; display: flex; gap: 14px; align-items: flex-start; }
  .helix { width: 28px; height: 118px; filter: drop-shadow(0 0 2px rgba(79,223,255,0.4)); }
  .hx { fill: none; stroke: var(--accent); stroke-width: 1.4; opacity: 0.85; } .hx-rung { stroke: var(--accent); stroke-width: 1; opacity: 0.4; }
  .bio-read { display: flex; flex-direction: column; gap: 5px; padding-top: 6px; }
  .bio-line { font-size: 11px; color: var(--fg); display: flex; gap: 8px; }
  .bio-line span { display: inline-block; width: 52px; font-size: 9px; letter-spacing: 0.12em; color: var(--muted); }

  /* world map */
  .map-mod { right: 218px; top: 138px; width: 200px; opacity: 0.85; }
  .worldmap { width: 200px; height: 110px; } .wm-grid { stroke: var(--accent); stroke-width: 0.5; opacity: 0.16; } .wm-dot { fill: var(--accent); opacity: 0.7; }

  /* right CPU gauge */
  .cpu-mod { right: 64px; top: 322px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cpu-dial { width: 48px; height: 48px; } .cd-ring { fill: none; stroke: var(--accent); stroke-width: 2; stroke-dasharray: 1 1.5; } .cd-in { fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.5; }
  .cpu-dial circle:not([class]) { fill: var(--accent); }

  /* bottom-right network */
  .net-mod { right: 60px; bottom: 104px; width: 230px; }
  .net-row { font-size: 11px; color: var(--fg); display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 6px; }
  .net-ar { color: var(--accent); font-size: 9px; } .net-ar.dn { color: var(--mag); }
  .net-bar { width: 60px; height: 4px; border: 0.5px solid var(--line); border-radius: 2px; overflow: hidden; } .net-bar b { display: block; height: 100%; background: var(--accent); }
  .net-addr { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  .net-addr div { font-size: 9.5px; color: var(--muted); display: flex; justify-content: flex-end; gap: 8px; } .net-addr span { color: var(--muted-2); letter-spacing: 0.12em; }

  /* bottom-left */
  .bl-mod { left: 54px; bottom: 84px; }
