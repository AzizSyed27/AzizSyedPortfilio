<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hand Mode — Armed State</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --f-display: "Instrument Serif", serif;
    --f-body: "Bricolage Grotesque", -apple-system, sans-serif;
    --f-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }

  .frame { position: relative; width: 100%; height: 100%; overflow: hidden;
    color: var(--fg); font-family: var(--f-body); padding: 44px 56px; }

  /* default (mouse) — amber theme */
  .theme-amber {
    --bg: #F2E0D0; --fg: #1A1F2A; --accent: #6E88B0; --surface: #ECD6C2;
    --line: rgba(26,31,42,0.14); --line-strong: rgba(26,31,42,0.32); --muted: rgba(26,31,42,0.6); --muted-2: rgba(26,31,42,0.4);
    background: #F2E0D0;
  }
  /* hand mode — blue/black */
  .theme-hand {
    --bg: #0A0F14; --fg: #E8F6FB; --accent: #4FDFFF; --accent-bright: #8BEBFF; --surface: rgba(15,26,36,0.7);
    --line: rgba(79,223,255,0.16); --line-strong: rgba(79,223,255,0.40); --muted: rgba(232,246,251,0.55); --muted-2: rgba(232,246,251,0.34);
    background: radial-gradient(120% 90% at 72% 12%, rgba(79,223,255,0.06), transparent 55%), #0A0F14;
  }

  .head { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 0.5px solid var(--line); padding-bottom: 16px; margin-bottom: 40px; }
  .eyebrow { font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg); }
  .eyebrow b { color: var(--accent); }
  .head .sub { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

  /* ── shared element styles (mirror portfolio defaults) ── */
  .btn { display: inline-flex; align-items: center; gap: 10px; font-family: var(--f-mono); font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase; border-radius: 999px;
    border: 0.5px solid var(--fg); background: var(--fg); color: var(--bg); padding: 13px 22px; }
  .btn .arr { display: inline-block; }

  .card { position: relative; background: var(--surface); border: 0.5px solid var(--line); border-radius: 10px;
    padding: 28px; width: 320px; display: flex; flex-direction: column; gap: 18px; }
  .card .pc-num { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--accent); }
  .card .pc-title { font-family: var(--f-display); font-size: 40px; line-height: 1; letter-spacing: -0.02em; margin-top: 6px; }
  .card .pc-desc { font-size: 13px; line-height: 1.5; color: var(--muted); }
  .card .pc-meta { display: flex; flex-wrap: wrap; gap: 6px; font-family: var(--f-mono); font-size: 10px; color: var(--muted); }
  .card .pc-meta span { border: 0.5px solid var(--line); padding: 3px 8px; border-radius: 999px; }

  /* ── HAND-MODE: enlarged hit-area (bigger padding than default) ── */
  .theme-hand .btn { padding: 21px 40px; font-size: 12px; border-color: var(--line-strong); background: transparent; color: var(--fg); }
  .theme-hand .card { padding: 40px; width: 340px; gap: 22px; }

  /* ════ REUSABLE ARMED / HOVER STATE ════ */
  .armed {
    transform: translateY(-4px);
    box-shadow: 0 0 0 1.5px var(--accent), 0 20px 44px -22px rgba(0,0,0,0.6);
    border-color: var(--accent);
    transition: transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s;
  }
  .theme-hand .btn.armed { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--fg); }

  /* hit-area visualization */
  .target { position: relative; display: inline-flex; }
  .hitbox { position: absolute; inset: -16px; border: 1px dashed var(--line-strong); border-radius: 18px; pointer-events: none; }
  .hitbox.card-hb { inset: -14px; border-radius: 20px; }
  .hit-label { position: absolute; top: -10px; left: 14px; transform: translateY(-50%); font-family: var(--f-mono);
    font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); background: var(--bg); padding: 0 5px; }
  .armed-chip { position: absolute; top: -11px; right: 14px; z-index: 3; display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--f-mono); font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bg);
    background: var(--accent); border-radius: 3px; padding: 2px 7px; }
  .armed-chip i { width: 5px; height: 5px; border-radius: 50%; background: var(--bg); }

  /* layout grid for hand-mode artboard */
  .hm-grid { display: grid; grid-template-columns: 96px 1fr 1fr; gap: 40px 56px; align-items: center; margin-top: 8px; }
  .col-head { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); text-align: center; }
  .row-label { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg); }
  .cell { display: flex; justify-content: center; }

  .spec { margin-top: 40px; border-top: 0.5px solid var(--line); padding-top: 18px; display: flex; gap: 40px; flex-wrap: wrap;
    font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--muted); }
  .spec b { color: var(--accent); font-weight: 500; }
  .spec .k { color: var(--fg); }

  /* default artboard layout */
  .def-stage { display: flex; align-items: flex-start; gap: 80px; margin-top: 30px; }
  .def-col { display: flex; flex-direction: column; align-items: flex-start; gap: 14px; }
  .def-cap { font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); }
  .def-note { margin-top: 44px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--muted); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel">
    function ViewWorkBtn({ armed }) {
      return (
        <button className={`btn ${armed ? "armed" : ""}`}>
          View work <span className="arr">→</span>
        </button>
      );
    }
    function ProjectCard({ armed }) {
      return (
        <article className={`card ${armed ? "armed" : ""}`}>
          <div>
            <div className="pc-num">P/02 · MyE46.app</div>
            <div className="pc-title">MyE46</div>
          </div>
          <p className="pc-desc">Agentic 3D car configurator. Plain-English mods, live budget-aware build updates.</p>
          <div className="pc-meta"><span>React Three Fiber</span><span>Three.js</span><span>Gemini API</span></div>
        </article>
      );
    }

    // ── ARTBOARD 1 · DEFAULT (mouse) ──
    function DefaultFrame() {
      return (
        <div className="frame theme-amber">
          <div className="head">
            <div className="eyebrow">DEFAULT · <b>MOUSE</b></div>
            <div className="sub">standard hit-area · pointer precision</div>
          </div>
          <div className="def-stage">
            <div className="def-col">
              <div className="def-cap">Button · rest</div>
              <ViewWorkBtn armed={false} />
            </div>
            <div className="def-col">
              <div className="def-cap">Project card · rest</div>
              <ProjectCard armed={false} />
            </div>
          </div>
          <div className="def-note">Hit-area = element bounds. Hover applies the theme's existing subtle lift — unchanged by hand mode.</div>
        </div>
      );
    }

    // ── ARTBOARD 2 · HAND MODE (armed) ──
    function HandFrame() {
      return (
        <div className="frame theme-hand">
          <div className="head">
            <div className="eyebrow">HAND MODE · <b>ARMED STATE</b></div>
            <div className="sub">reusable · applies to any interactive target</div>
          </div>
          <div className="hm-grid">
            <div></div>
            <div className="col-head">Rest</div>
            <div className="col-head">Armed · targetable</div>

            <div className="row-label">Button</div>
            <div className="cell">
              <div className="target"><span className="hit-label">hit area</span><div className="hitbox" /><ViewWorkBtn armed={false} /></div>
            </div>
            <div className="cell">
              <div className="target"><span className="hit-label">hit area</span><div className="hitbox" /><span className="armed-chip"><i />armed</span><ViewWorkBtn armed={true} /></div>
            </div>

            <div className="row-label">Project<br />card</div>
            <div className="cell">
              <div className="target"><span className="hit-label">hit area</span><div className="hitbox card-hb" /><ProjectCard armed={false} /></div>
            </div>
            <div className="cell">
              <div className="target"><span className="hit-label">hit area</span><div className="hitbox card-hb" /><span className="armed-chip"><i />armed</span><ProjectCard armed={true} /></div>
            </div>
          </div>
          <div className="spec">
            <span><span className="k">.armed</span> = lift 4px · <b>1.5px accent ring</b> · soft shadow</span>
            <span><span className="k">hit-area</span> = <b>+32px</b> over default · padding <b>21×40</b> vs 13×22</span>
            <span><span className="k">reads as</span> targetable from across the room</span>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="armed" title="Hand Mode · Armed / Hover State" subtitle="One reusable targetable state + enlarged hit-area — default mouse versions untouched">
            <DCArtboard id="def" label="Default · mouse" width={1180} height={720}><DefaultFrame /></DCArtboard>
            <DCArtboard id="hand" label="Hand mode · armed" width={1180} height={720}><HandFrame /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
