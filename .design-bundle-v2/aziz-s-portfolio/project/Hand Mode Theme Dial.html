<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hand Mode — Theme Dial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0F14; --fg: #E8F6FB; --accent: #4FDFFF; --accent-bright: #8BEBFF;
    --panel: rgba(8, 14, 21, 0.72); --line: rgba(79,223,255,0.16); --line-strong: rgba(79,223,255,0.40);
    --muted: rgba(232,246,251,0.55); --muted-2: rgba(232,246,251,0.34); --live: #2FE6C0;
    --f-display: "Instrument Serif", serif; --f-body: "Bricolage Grotesque", -apple-system, sans-serif; --f-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  .frame { position: relative; width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(120% 90% at 72% 14%, rgba(79,223,255,0.06), transparent 55%), var(--bg);
    color: var(--fg); font-family: var(--f-body); }

  /* mock page behind */
  .pg { position: absolute; inset: 0; z-index: 1; padding: 26px 40px; }
  .pg-top { display: flex; align-items: center; justify-content: space-between; padding-bottom: 18px; border-bottom: 0.5px solid var(--line); }
  .pg-brand { display: flex; align-items: flex-start; gap: 11px; }
  .pg-mark { font-family: var(--f-display); font-style: italic; font-size: 26px; line-height: 0.8; }
  .pg-meta { font-family: var(--f-mono); font-size: 8.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); line-height: 1.5; padding-top: 2px; }
  .pg-meta b { display: block; color: var(--fg); font-weight: 500; }
  .pg-nav { display: flex; gap: 15px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .pg-nav .on { color: var(--fg); }
  .pg-pill { display: inline-flex; align-items: center; gap: 8px; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    border: 0.5px solid var(--accent); border-radius: 999px; padding: 5px 11px; color: var(--accent); }
  .pg-pill .sw { width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(135deg, #F2E0D0 50%, #6E88B0 50%); }
  .pg-hero { margin-top: 64px; max-width: 60%; }
  .pg-eyebrow { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .pg-display { font-family: var(--f-display); font-weight: 400; font-size: 60px; line-height: 0.98; letter-spacing: -0.025em; }
  .pg-display em { font-style: italic; color: var(--accent); }

  /* dim scrim (page layout underneath unchanged) */
  .scrim { position: absolute; inset: 0; z-index: 4; background: rgba(5,8,12,0.62); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }

  /* HUD corners */
  .ov-corner { position: absolute; width: 26px; height: 26px; z-index: 8; }
  .ov-corner::before, .ov-corner::after { content: ""; position: absolute; background: var(--accent); opacity: 0.7; }
  .ov-corner::before { width: 13px; height: 1.5px; } .ov-corner::after { width: 1.5px; height: 13px; }
  .ov-corner.tl { top: 18px; left: 18px; } .ov-corner.tl::before, .ov-corner.tl::after { top: 0; left: 0; }
  .ov-corner.tr { top: 18px; right: 18px; } .ov-corner.tr::before { top: 0; right: 0; } .ov-corner.tr::after { top: 0; right: 0; }
  .ov-corner.bl { bottom: 18px; left: 18px; } .ov-corner.bl::before { bottom: 0; left: 0; } .ov-corner.bl::after { bottom: 0; left: 0; }
  .ov-corner.br { bottom: 18px; right: 18px; } .ov-corner.br::before { bottom: 0; right: 0; } .ov-corner.br::after { bottom: 0; right: 0; }

  /* ░░ MODAL ░░ */
  .modal { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 6; text-align: center; font-family: var(--f-mono); }
  .modal-title { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .modal-title b { color: var(--accent); }

  /* notch at 12 o'clock */
  .dial-wrap { position: relative; width: 420px; height: 420px; margin: 14px auto 0; }
  .notch { position: absolute; left: 50%; top: -6px; transform: translateX(-50%); z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .notch .tri { width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 10px solid var(--accent-bright); filter: drop-shadow(0 0 4px rgba(79,223,255,0.5)); }
  .notch .lab { font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }

  /* dial guide rings */
  .dial-rings { position: absolute; inset: 0; }
  .dial-rings svg { width: 100%; height: 100%; display: block; }
  .dial-rings .ring { fill: none; stroke: var(--line); stroke-width: 1; }
  .dial-rings .ring-dash { fill: none; stroke: var(--line-strong); stroke-width: 1; stroke-dasharray: 1 4; opacity: 0.8; }
  .dial-rings .tick { stroke: var(--line-strong); stroke-width: 1; }

  /* swatches */
  .swatch { position: absolute; left: 50%; top: 50%; width: 48px; height: 48px; margin: -24px 0 0 -24px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3); transition: all .35s cubic-bezier(.2,.7,.2,1); }
  .swatch.active { width: 86px; height: 86px; margin: -43px 0 0 -43px;
    border: 1.5px solid var(--accent-bright); box-shadow: 0 0 0 4px rgba(79,223,255,0.14), 0 16px 36px -12px rgba(0,0,0,0.7); z-index: 4; }
  .swatch i { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; }
  .swatch i::before, .swatch i::after { content: ""; position: absolute; inset: 0; }
  .swatch i::before { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }

  /* center hub */
  .hub { position: absolute; left: 50%; top: 50%; width: 108px; height: 108px; margin: -54px 0 0 -54px; border-radius: 50%;
    background: rgba(8,14,21,0.85); border: 0.5px solid var(--line-strong); display: grid; place-items: center; z-index: 3; }
  .hub .ring2 { position: absolute; inset: 8px; border-radius: 50%; border: 0.5px dashed var(--line); }
  .hub .htxt { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); padding-left: 0.24em; }
  .hub .hsub { position: absolute; bottom: 20px; font-size: 7.5px; letter-spacing: 0.12em; color: var(--muted-2); }

  /* active readout */
  .active-name { margin-top: 22px; font-family: var(--f-display); font-size: 30px; letter-spacing: -0.01em; color: var(--fg); }
  .active-hex { margin-top: 4px; font-size: 10px; letter-spacing: 0.1em; color: var(--accent); }
  .active-idx { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-2); margin-top: 8px; }

  .hint { margin-top: 18px; display: inline-flex; align-items: center; gap: 8px; font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
    border: 0.5px solid var(--line); border-radius: 999px; padding: 7px 16px; background: rgba(8,14,21,0.6); }
  .hint b { color: var(--accent); }
  .hint .sep { color: var(--muted-2); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel">
    const NAV = ["Index", "About", "Services", "Work", "Contact", "Log"];
    // 8 palettes [name, base, accent]
    const PALETTES = [
      ["Amber Smoke", "#F2E0D0", "#6E88B0"],
      ["Pistachio Frost", "#200F07", "#C5E384"],
      ["Matcha Mist", "#C2D8C4", "#222222"],
      ["Moss Velvet", "#385144", "#F8F5F2"],
      ["Dreamy Ocean", "#EAEBED", "#006989"],
      ["Chartreuse Lab", "#00272B", "#E0FF4F"],
      ["Robin Egg", "#2E382E", "#50C9CE"],
      ["Strawberry", "#3C1950", "#F0CDD2"],
    ];
    const ACTIVE = 0; // Amber Smoke sits at 12 o'clock

    function Dial() {
      const R = 168; // swatch orbit radius
      return (
        <div className="dial-wrap">
          {/* guide rings + ticks */}
          <div className="dial-rings">
            <svg viewBox="0 0 420 420">
              <circle cx="210" cy="210" r="168" className="ring-dash" />
              <circle cx="210" cy="210" r="196" className="ring" />
              <circle cx="210" cy="210" r="120" className="ring" />
              {PALETTES.map((_, i) => {
                const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
                return <line key={i} x1={210 + Math.cos(a) * 188} y1={210 + Math.sin(a) * 188} x2={210 + Math.cos(a) * 200} y2={210 + Math.sin(a) * 200} className="tick" />;
              })}
            </svg>
          </div>

          {/* notch at 12 o'clock */}
          <div className="notch"><div className="tri" /><div className="lab">active</div></div>

          {/* center hub */}
          <div className="hub"><div className="ring2" /><div className="htxt">Theme</div><div className="hsub">8 palettes</div></div>

          {/* swatches around the circle */}
          {PALETTES.map(([name, base, acc], i) => {
            const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
            const x = Math.cos(a) * R, y = Math.sin(a) * R;
            const isActive = i === ACTIVE;
            return (
              <div key={name} className={`swatch ${isActive ? "active" : ""}`}
                style={{ transform: `translate(${x}px, ${y}px)`, background: `linear-gradient(135deg, ${base} 0 50%, ${acc} 50% 100%)` }}
                title={name} />
            );
          })}
        </div>
      );
    }

    function MockPage() {
      return (
        <div className="pg">
          <div className="pg-top">
            <div className="pg-brand"><div className="pg-mark">AZ</div><div className="pg-meta"><b>Aziz Syed</b>Software Engineer</div></div>
            <div className="pg-nav">{NAV.map((n, i) => <span key={n} className={i === 0 ? "on" : ""}>{n}</span>)}</div>
            <div className="pg-pill"><span className="sw" /> Theme Select</div>
          </div>
          <div className="pg-hero">
            <div className="pg-eyebrow">Spatial control · engaged</div>
            <h1 className="pg-display">I build software that <em>thinks</em>, sees, and <em>responds</em>.</h1>
          </div>
        </div>
      );
    }

    function App() {
      const [name, base, acc] = PALETTES[ACTIVE];
      return (
        <DesignCanvas>
          <DCSection id="dial" title="Hand Mode · Theme Dial" subtitle="Radial palette picker modal — pinch the theme pill to open; page layout underneath unchanged">
            <DCArtboard id="dialboard" label="Theme dial · modal" width={1180} height={760}>
              <div className="frame">
                <MockPage />
                <div className="scrim" />
                <div className="ov-corner tl" /><div className="ov-corner tr" /><div className="ov-corner bl" /><div className="ov-corner br" />
                <div className="modal">
                  <div className="modal-title">SELECT · <b>THEME</b></div>
                  <Dial />
                  <div className="active-name">{name}</div>
                  <div className="active-hex">{base} · {acc}</div>
                  <div className="active-idx">01 / 08 · at 12 o'clock</div>
                  <div><span className="hint"><b>open palm</b><span className="sep">·</span> rotate wrist to spin <span className="sep">·</span> <b>pinch</b> to apply</span></div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
